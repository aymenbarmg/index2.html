content="مساعد الطالب السادس العلمي لإنشاء الجداول الدراسية الذكية وتنظيم المحاضرات والامتحانات والروتين اليومي.">

<meta name="keywords"
content="مساعد الطالب, السادس العلمي, جدول دراسي, تنظيم الدراسة, محاضرات, امتحانات, طالب سادس">

<meta property="og:image"
content="icon.png">

<title>مساعد طالب السادس العلمي</title>

<link rel="icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#1565c0;
}

.subject{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.subject h2{
margin-bottom:10px;
color:#333;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.addLecture{background:#4caf50;color:white;}
.addOnline{background:#ff9800;color:white;}
.addExam{background:#f44336;color:white;}

.generate{
width:100%;
background:#1565c0;
color:white;
font-size:18px;
padding:15px;
}

.saveBtn{
width:100%;
background:#2e7d32;
color:white;
font-size:16px;
padding:12px;
}

.clearBtn{
width:100%;
background:#c62828;
color:white;
font-size:16px;
padding:12px;
}

.event{
background:#eef5ff;
padding:10px;
margin-top:10px;
border-radius:10px;
border-right:5px solid #1565c0;
}

.dayCard{
background:white;
padding:15px;
margin-top:15px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.dayTitle{
color:#1565c0;
margin-bottom:10px;
}

.study{
color:#4caf50;
font-weight:bold;
}

.exam{
color:red;
font-weight:bold;
}

.online{
color:#ff9800;
font-weight:bold;
}

.lecture{
color:#1565c0;
font-weight:bold;
}

.deleteBtn{
background:#d32f2f;
color:white;
padding:5px 10px;
font-size:12px;
}
</style>
</head>

<body>

<h1>📚 مساعد طالب السادس العلمي</h1>

<div id="subjects"></div>

<button class="saveBtn" onclick="saveData()">💾 حفظ البيانات</button>
<button class="generate" onclick="generateSchedule()">إنشاء الجدول الذكي</button>
<button class="generate" onclick="generateRoutine()">
📅 إنشاء روتين يومي
</button>
<button class="clearBtn" onclick="clearAll()">🗑 حذف كل شيء</button>

<div id="result"></div>

<script>
    function formatTime12h(time24){
let [h, m] = time24.split(":");
h = parseInt(h);

if(isNaN(h)) return "";

let period = h >= 12 ? "مساءً" : "صباحاً";

h = h % 12;
if(h === 0) h = 12;

return `${h}:${m} ${period}`;
}
function generateRoutine(){

const days = [
"السبت","الأحد","الإثنين",
"الثلاثاء","الأربعاء",
"الخميس","الجمعة"
];

let html = "<h2>📅 الروتين اليومي</h2>";

days.forEach(day=>{

let count =
document.querySelectorAll(
`.event .day`
);

html += `
<div class="dayCard">
<h2 class="dayTitle">${day}</h2>

<ul>
<li>🌅 الاستيقاظ: 6:00 صباحاً</li>
<li>🍳 الفطور: 6:30 صباحاً</li>
<li>📚 دراسة: 7:00 صباحاً</li>
<li>☕ استراحة: 10:00 صباحاً</li>
<li>📖 دراسة: 10:30 صباحاً</li>
<li>🍽 الغداء: 1:00 ظهراً</li>
<li>😴 راحة: 2:00 ظهراً</li>
<li>📚 دراسة: 4:00 عصراً</li>
<li>🍴 العشاء: 8:00 مساءً</li>
<li>🛏 النوم: 10:30 مساءً</li>
</ul>

</div>
`;

});

document.getElementById("result").innerHTML = html;

saveData();

}
const subjects = [
"العربي",
"الإنكليزي",
"الرياضيات",
"الفيزياء",
"الكيمياء",
"الأحياء",
"الإسلامية"
];

const subjectsContainer =
document.getElementById("subjects");

function loadSubjects(){

subjectsContainer.innerHTML="";

subjects.forEach((name,index)=>{

subjectsContainer.innerHTML += `
<div class="subject">

<h2>${name}</h2>

<label>
<input type="checkbox" id="registered${index}">
مسجل في معهد
</label>

<input
id="institute${index}"
placeholder="اسم المعهد">

<div id="events${index}"></div>

<button
class="addLecture"
onclick="addLecture(${index})">
➕ محاضرة
</button>

<button
class="addOnline"
onclick="addOnlineExam(${index})">
💻 إلكتروني
</button>

<button
class="addExam"
onclick="addPhysicalExam(${index})">
📝 حضوري
</button>

</div>
`;

});

}

function createEventHTML(type){

return `
<div class="event">

<b>${type}</b>

<select class="day">
<option>السبت</option>
<option>الأحد</option>
<option>الإثنين</option>
<option>الثلاثاء</option>
<option>الأربعاء</option>
<option>الخميس</option>
<option>الجمعة</option>
</select>

<input type="time" class="startTime">
<input type="time" class="endTime">

<button
class="deleteBtn"
onclick="this.parentElement.remove();saveData();">
حذف
</button>

</div>
`;

}function addLecture(i){

document
.getElementById(`events${i}`)
.insertAdjacentHTML(
"beforeend",
createEventHTML("🎓 محاضرة")
);

saveData();

}

function addOnlineExam(i){

document
.getElementById(`events${i}`)
.insertAdjacentHTML(
"beforeend",
createEventHTML("💻 إلكتروني")
);

saveData();

}

function addPhysicalExam(i){

document
.getElementById(`events${i}`)
.insertAdjacentHTML(
"beforeend",
createEventHTML("📝 حضوري")
);

saveData();

}

/* حفظ البيانات */
function saveData(){

const data = {

subjectsHTML:
document.getElementById("subjects").innerHTML,

scheduleHTML:
document.getElementById("result").innerHTML

};

localStorage.setItem(
"studyApp",
JSON.stringify(data)
);

}

/* تحميل البيانات */
function loadData(){

const saved =
localStorage.getItem("studyApp");

if(!saved) return;

const data =
JSON.parse(saved);

document.getElementById("subjects").innerHTML =
data.subjectsHTML || "";

document.getElementById("result").innerHTML =
data.scheduleHTML || "";

}

/* حذف الكل */
function clearAll(){

if(confirm("هل تريد حذف كل البيانات؟")){

localStorage.removeItem("studyApp");

location.reload();

}

}

/* إنشاء الجدول */
function generateSchedule(){

const days = [
"السبت",
"الأحد",
"الإثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة"
];

let week = {};

days.forEach(day=>{
week[day]=[];
});

subjects.forEach((subject,index)=>{

document
.querySelectorAll(`#events${index} .event`)
.forEach(ev=>{

week[
ev.querySelector(".day").value
].push({

subject,

type:
ev.querySelector("b").innerText,

start:
ev.querySelector(".startTime").value,

end:
ev.querySelector(".endTime").value

});

});

});

let html="";

days.forEach(day=>{

html += `
<div class="dayCard">

<h2 class="dayTitle">
${day}
</h2>

<ul>
`;

week[day].sort(
(a,b)=>
a.start.localeCompare(b.start)
);

if(week[day].length===0){

html += `
<li>
📖 مراجعة عامة
</li>
`;

}

week[day].forEach(item=>{

if(item.type.includes("محاضرة")){

html += `
<li class="lecture">
${formatTime12h(item.start)} - ${formatTime12h(item.end)}
${item.type}
${item.subject}
</li>
`;

}

if(item.type.includes("إلكتروني")){

html += `
<li class="online">
${formatTime12h(item.start)} - ${formatTime12h(item.end)}
${item.type}
${item.subject}
${item.type}
${item.subject}
</li>
`;

}

if(item.type.includes("حضوري")){

html += `
<li class="exam">
${formatTime12h(item.start)} - ${formatTime12h(item.end)}
${item.type}
${item.subject}
${item.type}
${item.subject}
</li>
`;

}

});

html += `
</ul>
</div>
`;

});

document.getElementById("result").innerHTML =
html;

/* حفظ الجدول تلقائياً */
saveData();

}

/* حفظ تلقائي عند أي تعديل */
document.addEventListener(
"change",
saveData
);

/* تشغيل */
loadSubjects();
loadData();

</script>

</body>
</html>
